name: 'CodeTrust Scan'
description: 'Verify AI-generated code with deterministic trust scoring'
author: 'CodeTrust'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  min-score:
    description: 'Minimum trust score threshold (0-100). Fails if score is below.'
    required: false
    default: '70'
  diff-ref:
    description: 'Git ref to diff against (e.g. origin/main, HEAD~1)'
    required: false
    default: 'origin/main'
  format:
    description: 'Output format: terminal or json'
    required: false
    default: 'terminal'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install CodeTrust
      shell: bash
      run: npm install -g @gulu9527/code-trust

    - name: Run CodeTrust scan
      shell: bash
      env:
        DIFF_REF: ${{ inputs.diff-ref }}
        FORMAT: ${{ inputs.format }}
        MIN_SCORE: ${{ inputs.min-score }}
      run: |
        codetrust scan --diff "$DIFF_REF" --format "$FORMAT" --min-score "$MIN_SCORE"
